<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Harmonics Builder</title>
  <!-- Original AoPS interactive. Replaces the third-party "Fourier: Making Waves" simulation. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="eigennode-aspect" content="14/9">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #cwrap {
      flex: 1 1 auto; min-height: 0; width: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    canvas { display: block; touch-action: none; max-width: 100%; max-height: 100%; }
    #bar {
      flex: 0 0 auto; width: 100%; max-width: 700px;
      min-height: 50px; display: flex; align-items: center; flex-wrap: wrap;
      gap: 14px; padding: 6px 14px; font-size: 13px; color: #334;
    }
    .seg { display: inline-flex; border: 1px solid #9aa4b2; border-radius: 6px; overflow: hidden; }
    .seg button {
      border: none; background: #fff; padding: 5px 13px;
      font: 13px 'Segoe UI', system-ui, sans-serif; color: #556; cursor: pointer;
    }
    .seg button.on { background: #2266ee; color: #fff; }
    .ctl { display: inline-flex; align-items: center; gap: 7px; }
    input[type=checkbox] { accent-color: #2266ee; }
    #btnNew, #btnReset {
      border: 1px solid #9aa4b2; background: #fff; border-radius: 6px;
      padding: 5px 12px; font: 13px 'Segoe UI', system-ui, sans-serif;
      color: #556; cursor: pointer;
    }
    #btnReset { margin-left: auto; }
    #btnNew:hover, #btnReset:hover, .seg button:hover:not(.on) { background: #eef2f8; }
    #btnNew:disabled { opacity: 0.45; cursor: default; }
    #btnNew.pulse { border-color: #00aa55; color: #007a3d; animation: pulseBtn 1.2s infinite; }
    @keyframes pulseBtn {
      0%   { box-shadow: 0 0 0 0 rgba(0,170,85,0.45); }
      70%  { box-shadow: 0 0 0 8px rgba(0,170,85,0); }
      100% { box-shadow: 0 0 0 0 rgba(0,170,85,0); }
    }
  </style>
</head>
<body>
  <div id="cwrap"><canvas id="c" width="700" height="400"></canvas></div>
  <div id="bar">
    <span class="seg">
      <button id="bGame">Game</button><button id="bFree">Free play</button>
    </span>
    <button id="btnNew">New target</button>
    <label class="ctl"><input type="checkbox" id="chkParts"> Show harmonics</label>
    <button id="btnReset" title="Reset">&#8635; Reset</button>
  </div>
  <script>
  (() => {
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 700, H = 400;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.scale(dpr, dpr);

    // ── Layout ───────────────────────────────────────────────────────
    const PLOT = { x: 14, y: 12, w: 672, h: 224 };       // wave panel
    const MID = PLOT.y + PLOT.h / 2;                     // 124
    const AMP_PX = 42;                                   // px per amplitude unit
    const TX = [110, 230, 350, 470, 590];                // slider track centers
    const T_TOP = 268, T_BOT = 378;
    const T_ZERO = (T_TOP + T_BOT) / 2, T_HALF = (T_BOT - T_TOP) / 2;
    const HCOLORS = ['#e05252', '#e6962e', '#3aa53a', '#2e86d4', '#9b59b6'];

    // ── Target bank ──────────────────────────────────────────────────
    const TARGETS = [
      { name: 'Square-ish',   a: [0.80, 0,     0.25, 0,     0.15] },
      { name: 'Triangle-ish', a: [0.85, 0,    -0.10, 0,     0.05] },
      { name: 'Sawtooth-ish', a: [0.75, -0.35, 0.25, -0.15, 0.10] },
      { name: 'Chord: 1 + 2', a: [0.65, 0.45,  0,    0,     0   ] },
      { name: 'Chord: 2 + 3', a: [0,    0.60,  0.40, 0,     0   ] },
      { name: 'Chord: 1 + 5', a: [0.70, 0,     0,    0,     0.35] },
    ];

    // ── URL presets: ?mode=free&target=3&parts=1 ─────────────────────
    const params = new URLSearchParams(location.search);
    const tParam = parseInt(params.get('target'), 10);
    const init = {
      mode: params.get('mode') === 'free' ? 'free' : 'game',
      // ?target= is 1-based; without it the first target is random (game only)
      tIdx: (tParam >= 1 && tParam <= TARGETS.length)
        ? tParam - 1
        : Math.floor(Math.random() * TARGETS.length),
      parts: params.get('parts') === '1',
    };

    // ── State ────────────────────────────────────────────────────────
    let mode, tIdx, amps, score, matched, matchT, showParts;
    let dragIdx = -1, hintDone = false;
    let lastMx = -100, lastMy = -100;
    let animT = 0;

    function applyInit() {
      mode = init.mode; tIdx = init.tIdx;
      amps = [0, 0, 0, 0, 0];
      score = 0; matched = false; matchT = -10;
      showParts = init.parts; hintDone = false;
      syncControls();
    }

    // ── Controls ─────────────────────────────────────────────────────
    const bGame = document.getElementById('bGame');
    const bFree = document.getElementById('bFree');
    const btnNew = document.getElementById('btnNew');
    const chkParts = document.getElementById('chkParts');

    function syncControls() {
      bGame.classList.toggle('on', mode === 'game');
      bFree.classList.toggle('on', mode === 'free');
      btnNew.disabled = mode === 'free';
      btnNew.classList.toggle('pulse', mode === 'game' && matched);
      chkParts.checked = showParts;
    }
    bGame.addEventListener('click', () => { mode = 'game'; syncControls(); });
    bFree.addEventListener('click', () => { mode = 'free'; syncControls(); });
    btnNew.addEventListener('click', () => {
      if (mode !== 'game') return;
      let j;
      do { j = Math.floor(Math.random() * TARGETS.length); } while (j === tIdx);
      tIdx = j; amps = [0, 0, 0, 0, 0]; matched = false;
      syncControls();
    });
    chkParts.addEventListener('change', () => { showParts = chkParts.checked; });
    document.getElementById('btnReset').addEventListener('click', applyInit);

    // ── Match scoring (Parseval: coefficient-space distance) ─────────
    function matchStats() {
      const t = TARGETS[tIdx].a;
      let e2 = 0, r2 = 0;
      for (let n = 0; n < 5; n++) {
        e2 += (amps[n] - t[n]) * (amps[n] - t[n]);
        r2 += t[n] * t[n];
      }
      const err = Math.sqrt(e2), ref = Math.max(Math.sqrt(r2), 0.5);
      return { err, pct: Math.max(0, 1 - err / ref), thresh: 0.12 * ref };
    }

    // ── Drawing helpers ──────────────────────────────────────────────
    function rrect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + w, y, x + w, y + h, r);
      ctx.arcTo(x + w, y + h, x, y + h, r);
      ctx.arcTo(x, y + h, x, y, r);
      ctx.arcTo(x, y, x + w, y, r);
      ctx.closePath();
    }

    const K = 2 * Math.PI * 2 / PLOT.w;   // two fundamental periods across plot

    function traceWave(a, phi) {
      ctx.beginPath();
      for (let px = 0; px <= PLOT.w; px += 2) {
        let s = 0;
        for (let n = 0; n < 5; n++) {
          if (a[n]) s += a[n] * Math.sin((n + 1) * (K * px - phi));
        }
        const y = MID - s * AMP_PX;
        px === 0 ? ctx.moveTo(PLOT.x + px, y) : ctx.lineTo(PLOT.x + px, y);
      }
      ctx.stroke();
    }

    function drawPlot(phi, stats) {
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.rect(PLOT.x, PLOT.y, PLOT.w, PLOT.h);
      ctx.fill(); ctx.stroke();

      ctx.save();
      ctx.beginPath();
      ctx.rect(PLOT.x + 1, PLOT.y + 1, PLOT.w - 2, PLOT.h - 2);
      ctx.clip();

      // Midline
      ctx.strokeStyle = 'rgba(0,0,0,0.12)'; ctx.lineWidth = 1;
      ctx.setLineDash([6, 6]);
      ctx.beginPath(); ctx.moveTo(PLOT.x, MID); ctx.lineTo(PLOT.x + PLOT.w, MID);
      ctx.stroke(); ctx.setLineDash([]);

      // Target (faint, thick) — game mode only
      if (mode === 'game') {
        ctx.strokeStyle = 'rgba(150,155,170,0.55)';
        ctx.lineWidth = 5.5; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        traceWave(TARGETS[tIdx].a, phi);
      }

      // Individual harmonics
      if (showParts) {
        ctx.lineWidth = 1.3; ctx.globalAlpha = 0.45;
        for (let n = 0; n < 5; n++) {
          if (!amps[n]) continue;
          ctx.strokeStyle = HCOLORS[n];
          const solo = [0, 0, 0, 0, 0]; solo[n] = amps[n];
          traceWave(solo, phi);
        }
        ctx.globalAlpha = 1;
      }

      // Student's sum
      ctx.save();
      if (mode === 'game' && matched) { ctx.shadowColor = '#00aa55'; ctx.shadowBlur = 10; }
      ctx.strokeStyle = '#00aa55'; ctx.lineWidth = 2.5; ctx.lineJoin = 'round';
      traceWave(amps, phi);
      ctx.restore();

      // Starburst flourish on a fresh match
      const p = (animT - matchT) / 0.9;
      if (mode === 'game' && p >= 0 && p < 1) {
        ctx.strokeStyle = '#f0a500'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        ctx.globalAlpha = 1 - p;
        for (let i = 0; i < 12; i++) {
          const a = i * Math.PI / 6 + 0.26;
          const r0 = 26 + 95 * p, r1 = r0 + 16;
          ctx.beginPath();
          ctx.moveTo(350 + r0 * Math.cos(a), MID + r0 * Math.sin(a));
          ctx.lineTo(350 + r1 * Math.cos(a), MID + r1 * Math.sin(a));
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
      }
      ctx.restore(); // end plot clip

      // ── Plot overlays ──
      ctx.textAlign = 'left'; ctx.font = '12px Segoe UI'; ctx.fillStyle = '#556';
      if (mode === 'game') {
        ctx.fillText('Target: ', PLOT.x + 10, 30);
        ctx.font = 'bold 12px Segoe UI'; ctx.fillStyle = '#334';
        ctx.fillText(TARGETS[tIdx].name, PLOT.x + 55, 30);

        ctx.font = 'bold 12px Segoe UI'; ctx.fillStyle = '#556';
        ctx.fillText('Score: ' + score, PLOT.x + 10, PLOT.y + PLOT.h - 10);

        // Match meter
        const mb = { x: 496, y: 20, w: 120, h: 9 };
        ctx.font = '11px Segoe UI'; ctx.fillStyle = '#778899'; ctx.textAlign = 'right';
        ctx.fillText('Match', mb.x - 6, mb.y + 8);
        ctx.fillStyle = 'rgba(0,0,0,0.08)'; ctx.fillRect(mb.x, mb.y, mb.w, mb.h);
        ctx.fillStyle = 'hsl(' + Math.round(120 * stats.pct) + ',65%,42%)';
        ctx.fillRect(mb.x, mb.y, mb.w * stats.pct, mb.h);
        ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
        ctx.strokeRect(mb.x, mb.y, mb.w, mb.h);
        ctx.fillStyle = '#556'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'left';
        ctx.fillText(Math.round(stats.pct * 100) + '%', mb.x + mb.w + 7, mb.y + 8);

        if (matched) {
          ctx.fillStyle = '#00aa55'; ctx.font = 'bold 14px Segoe UI';
          ctx.textAlign = 'center';
          ctx.fillText('Matched!  Press “New target”', 330, 32);
        } else if (!hintDone) {
          ctx.fillStyle = '#aabbcc'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
          ctx.fillText('Drag the sliders to match the gray wave', 350, PLOT.y + PLOT.h - 10);
        }
      } else {
        ctx.font = 'bold 12px Segoe UI'; ctx.fillStyle = '#556';
        ctx.fillText('Free play', PLOT.x + 10, 30);
        if (!hintDone) {
          ctx.fillStyle = '#aabbcc'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
          ctx.fillText('Mix harmonics 1–5 to build your own wave', 350, PLOT.y + PLOT.h - 10);
        }
      }
    }

    function drawSliders() {
      ctx.fillStyle = '#8895a3'; ctx.font = '11px Segoe UI'; ctx.textAlign = 'center';
      ctx.fillText('Harmonic amplitudes', 350, 256);

      // Scale labels beside the first track
      ctx.font = '9px Segoe UI'; ctx.fillStyle = '#99a3ae'; ctx.textAlign = 'right';
      ctx.fillText('+1', TX[0] - 22, T_TOP + 4);
      ctx.fillText('0', TX[0] - 22, T_ZERO + 3);
      ctx.fillText('−1', TX[0] - 22, T_BOT + 3);

      for (let i = 0; i < 5; i++) {
        const tx = TX[i], col = HCOLORS[i];
        // Track slot
        rrect(tx - 3, T_TOP, 6, T_BOT - T_TOP, 3);
        ctx.fillStyle = '#dfe3ea'; ctx.fill();
        ctx.strokeStyle = '#c5cad4'; ctx.lineWidth = 1; ctx.stroke();
        // Zero tick
        ctx.strokeStyle = '#aab2bd'; ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(tx - 12, T_ZERO); ctx.lineTo(tx + 12, T_ZERO);
        ctx.stroke();
        // Knob (with harmonic number inside)
        const ky = T_ZERO - amps[i] * T_HALF;
        const hot = dragIdx === i ||
          (Math.abs(lastMx - tx) < 20 && lastMy > T_TOP - 12 && lastMy < T_BOT + 12);
        ctx.save();
        if (hot) { ctx.shadowColor = col; ctx.shadowBlur = 12; }
        rrect(tx - 14, ky - 9, 28, 18, 5);
        ctx.fillStyle = col; ctx.fill();
        ctx.strokeStyle = 'rgba(0,0,0,0.25)'; ctx.lineWidth = 1; ctx.stroke();
        ctx.restore();
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px Segoe UI'; ctx.textAlign = 'center';
        ctx.fillText(i + 1, tx, ky + 4);
        // Value
        const v = amps[i];
        ctx.fillStyle = col; ctx.font = 'bold 11px Segoe UI';
        ctx.fillText(v === 0 ? '0.00' : (v < 0 ? '−' : '+') + Math.abs(v).toFixed(2), tx, 396);
      }
    }

    // ── Main draw ────────────────────────────────────────────────────
    function draw() {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#f5f5f5'; ctx.fillRect(0, 0, W, H);

      const phi = 0.6 * animT;
      const stats = matchStats();

      // Match detection (once per target, game mode)
      if (mode === 'game' && !matched && stats.err <= stats.thresh) {
        matched = true; matchT = animT; score++;
        syncControls();
      }

      drawPlot(phi, stats);
      drawSliders();
    }

    // ── Animation loop ───────────────────────────────────────────────
    let lastTs = null;
    function frame(ts) {
      if (!lastTs) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts; animT += dt;
      draw();
      requestAnimationFrame(frame);
    }

    // ── Interaction (pointer events: mouse + touch) ──────────────────
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height)];
    };
    const quant = v => Math.max(-1, Math.min(1, Math.round(v * 20) / 20));
    function setFromY(i, my) {
      amps[i] = quant((T_ZERO - my) / T_HALF);
      hintDone = true;
    }
    canvas.addEventListener('pointerdown', e => {
      const [mx, my] = cpos(e);
      for (let i = 0; i < 5; i++) {
        if (Math.abs(mx - TX[i]) < 20 && my > T_TOP - 12 && my < T_BOT + 12) {
          dragIdx = i;
          setFromY(i, my);
          canvas.setPointerCapture(e.pointerId);
          break;
        }
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [mx, my] = cpos(e);
      lastMx = mx; lastMy = my;
      if (dragIdx >= 0) {
        setFromY(dragIdx, my);
        canvas.style.cursor = 'grabbing';
      } else {
        const over = TX.some((tx, i) =>
          Math.abs(mx - tx) < 20 && my > T_TOP - 12 && my < T_BOT + 12);
        canvas.style.cursor = over ? 'grab' : 'default';
      }
    });
    const endDrag = () => { dragIdx = -1; };
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);
    canvas.addEventListener('pointerleave', () => { lastMx = -100; lastMy = -100; });

    applyInit();
    requestAnimationFrame(frame);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "mode",
        "type": "select",
        "values": [
            "game",
            "free"
        ],
        "default": "game",
        "desc": "Game mode vs free exploration"
    },
    {
        "name": "target",
        "type": "number",
        "min": 1,
        "max": 6,
        "step": 1,
        "default": 1,
        "desc": "Target harmonic pattern index (1–6)"
    },
    {
        "name": "parts",
        "type": "toggle",
        "default": 0,
        "desc": "Show individual harmonic components"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];
  function buildCleanUrl(ov) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function(k) { p.delete(k); });
    for (var k in ov) { var v=ov[k]; if(v===null||v==='') p.delete(k); else p.set(k,v); }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }
  function buildCheatUrl(ov) {
    var b = buildCleanUrl(ov);
    return b + (b.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }
  function getEff(d) {
    var r = _cpQ.get(d.name);
    return r !== null ? r : (d['default'] !== undefined ? String(d['default']) : '');
  }
  function isTruthy(v) { return v!=='0'&&v!=='false'&&v!=='no'&&v!=='off'&&v!==''; }

  function makeControl(d) {
    var eff = getEff(d);
    if (d.type === 'toggle') {
      var on = isTruthy(eff), btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:'+(on?'#1b3d1b':'#3d1b1b')+';color:'+(on?'#6dca80':'#e07070')+
        ';border:1px solid '+(on?'#2a7a3a':'#8a2a2a')+';border-radius:3px;padding:3px 10px;'+
        'cursor:pointer;font-size:12px;min-width:70px';
      btn.onclick = function() { var u={}; u[d.name]=on?'0':'1'; location.href=buildCheatUrl(u); };
      return btn;
    }
    if (d.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
        'border-radius:3px;padding:3px 8px;font-size:12px;cursor:pointer';
      d.values.forEach(function(v) {
        var o = document.createElement('option'); o.value=v; o.textContent=v;
        if (eff===String(v)) o.selected=true; sel.appendChild(o);
      });
      sel.onchange = function() { var u={}; u[d.name]=sel.value; location.href=buildCheatUrl(u); };
      return sel;
    }
    var inp = document.createElement('input');
    inp.type = d.type==='number' ? 'number' : 'text'; inp.value = eff;
    if (d.min!==undefined) inp.min=String(d.min);
    if (d.max!==undefined) inp.max=String(d.max);
    if (d.step!==undefined) inp.step=String(d.step);
    inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;'+
      'border-radius:3px;padding:3px 6px;width:'+(d.type==='number'?'90':'220')+'px;font-size:12px';
    inp.onchange = function() { var u={}; u[d.name]=inp.value; location.href=buildCheatUrl(u); };
    return inp;
  }

  function typeLabel(d) {
    if (d.type==='toggle') return '0|1';
    if (d.type==='select') return d.values.join('|');
    if (d.type==='number'&&d.min!==undefined&&d.max!==undefined) return d.min+'–'+d.max;
    return d.type;
  }

  function render() {
    var panel = document.createElement('div');
    panel.style.cssText = 'position:fixed;bottom:0;left:0;right:0;'+
      'background:rgba(12,18,32,0.97);color:#c8d8e8;'+
      'font-family:"Segoe UI",system-ui,monospace;font-size:13px;'+
      'border-top:2px solid #3a7bd5;z-index:2147483647;max-height:48vh;overflow-y:auto;'+
      'padding:10px 16px 14px;box-sizing:border-box;box-shadow:0 -4px 24px rgba(0,0,0,0.6)';

    var bubble = document.createElement('button');
    bubble.style.cssText = 'position:fixed;bottom:8px;right:12px;'+
      'background:rgba(12,18,32,0.95);color:#7ab8f5;border:1px solid #3a7bd5;'+
      'border-radius:4px;padding:4px 12px;font-size:12px;'+
      'font-family:"Segoe UI",system-ui,monospace;cursor:pointer;'+
      'z-index:2147483647;display:none;box-shadow:0 2px 8px rgba(0,0,0,0.5);user-select:none';
    bubble.textContent = '🔑 Cheat Panel';
    bubble.onclick = function() { bubble.style.display='none'; panel.style.display=''; };
    document.body.appendChild(bubble);

    var hdr = document.createElement('div');
    hdr.style.cssText = 'font-weight:bold;color:#7ab8f5;margin-bottom:8px;'+
      'display:flex;align-items:center;justify-content:space-between';
    var hspan = document.createElement('span');
    hspan.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var btns = document.createElement('div');
    btns.style.cssText = 'display:flex;align-items:center;gap:2px';
    var minbtn = document.createElement('button');
    minbtn.textContent = '−';
    minbtn.title = 'Minimize (restore without reloading)';
    minbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    minbtn.onclick = function() { panel.style.display='none'; bubble.style.display=''; };
    var xbtn = document.createElement('button');
    xbtn.textContent = '×'; xbtn.title = 'Close (reload to restore)';
    xbtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;cursor:pointer;padding:0 4px;line-height:1';
    xbtn.onclick = function() { panel.remove(); bubble.remove(); };
    btns.appendChild(minbtn); btns.appendChild(xbtn);
    hdr.appendChild(hspan); hdr.appendChild(btns); panel.appendChild(hdr);

    var tbl = document.createElement('table');
    tbl.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var hrow = tbl.createTHead().insertRow();
    ['Parameter','Type/Values','Control','Description'].forEach(function(h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;'+
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = tbl.createTBody();
    CHEAT_DEFS.forEach(function(d) {
      var row = tbody.insertRow(), isSet = _cpQ.has(d.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;'+
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;'+
        'color:'+(isSet?'#a8d4ff':'#7fa8d0')+';white-space:nowrap;font-family:monospace';
      nc.textContent = d.name;
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;font-family:monospace';
      tc.textContent = typeLabel(d);
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(d));
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (d.desc||'')+(d['default']!==undefined?' (default: '+d['default']+')':'');
    });
    panel.appendChild(tbl);

    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;'+
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var ulbl = document.createElement('span');
    ulbl.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;'+
      'letter-spacing:.06em;white-space:nowrap;flex-shrink:0';
    ulbl.textContent = 'Embed URL:';
    var ulink = document.createElement('a');
    ulink.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;'+
      'font-family:monospace;text-decoration:none';
    ulink.href = buildCleanUrl({}); ulink.textContent = buildCleanUrl({});
    ulink.onclick = function(e) { e.preventDefault(); location.href=buildCheatUrl({}); };
    var cpybtn = document.createElement('button');
    cpybtn.textContent = 'copy';
    cpybtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;'+
      'border-radius:3px;padding:2px 8px;font-size:11px;cursor:pointer;'+
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    cpybtn.onclick = function() {
      navigator.clipboard && navigator.clipboard.writeText(buildCleanUrl({}));
      cpybtn.textContent = '✓ copied';
      setTimeout(function() { cpybtn.textContent = 'copy'; }, 1500);
    };
    urlBox.appendChild(ulbl); urlBox.appendChild(ulink); urlBox.appendChild(cpybtn);
    panel.appendChild(urlBox);
    document.body.appendChild(panel);
  }
  render();
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });

  document.documentElement.addEventListener('wheel', function (e) {
    if (Z <= 1 && e.deltaY > 0) return;
    e.preventDefault();
    var factor = e.deltaY < 0 ? 1.1 : (1 / 1.1);
    var newZ   = Math.max(1, Math.min(4, parseFloat((Z * factor).toFixed(3))));
    if (newZ === Z) return;
    var px = e.clientX, py = e.clientY;
    tx = px + (tx - px) * (newZ / Z);
    ty = py + (ty - py) * (newZ / Z);
    if (newZ === 1) { tx = 0; ty = 0; }
    Z = newZ;
    apply();
  }, { passive: false });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
