<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Two-Speaker Interference</title>
  <!-- Original AoPS interactive. Replaces the third-party "Wave Interference" simulation. -->
<script>
// responsive-scale-to-fit v1 -- replaces the fixed-size embed + height report.
// Scales the whole sim (the document body) to fit the iframe/sticky it is
// given: preserve aspect ratio, centre, cap the zoom. The transform is
// presentation only. Tunable per embed: ?maxscale= (zoom cap), ?maxw= (px
// width cap), ?h= (exact reported height), ?maxh= (anti-spill ceiling).
// NOTE: the AoPS live-chat embed sizes the iframe from its height= attribute
// and ignores the reported height; set height= there.
(function () {
  var DOC = document.documentElement;
  var Q = new URLSearchParams(location.search);
  var num = function (k, d) { return Q.has(k) && isFinite(+Q.get(k)) ? +Q.get(k) : d; };
  var MAXSCALE = num('maxscale', 2.4), MAXW = num('maxw', 0);
  var FIXED_H = num('h', 0), REPORT_MAX = num('maxh', 320), REPORT_MIN = 140;
  var lastH = 0;
  function fit() {
    var b = document.body; if (!b) return;
    var natW = b.offsetWidth, natH = b.offsetHeight;
    if (!natW || !natH) return;
    var vw = DOC.clientWidth, vh = DOC.clientHeight;
    var cap = MAXW > 0 ? Math.min(MAXSCALE, MAXW / natW) : MAXSCALE;
    var s = Math.min(vw / natW, vh / natH, cap);
    if (!isFinite(s) || s <= 0) s = Math.min(vw / natW, cap);
    b.style.transform = 'translate(-50%, -50%) scale(' + s + ')';
    var rh = FIXED_H > 0 ? Math.max(80, Math.min(2000, FIXED_H))
      : Math.max(REPORT_MIN, Math.min(REPORT_MAX, Math.round(natH * Math.min(vw / natW, cap))));
    if (Math.abs(rh - lastH) >= 2) { lastH = rh; try { window.parent.postMessage({ type: 'resize', height: rh }, '*'); } catch (e) {} }
  }
  function boot() {
    var b = document.body; if (!b) return;
    DOC.style.cssText += ';width:100%;height:100%;margin:0;overflow:hidden;background:transparent;';
    b.style.position = 'absolute'; b.style.top = '50%'; b.style.left = '50%';
    b.style.margin = '0'; b.style.transformOrigin = 'center center'; b.style.willChange = 'transform';
    fit();
    addEventListener('resize', fit); addEventListener('orientationchange', fit);
    if (window.ResizeObserver) new ResizeObserver(fit).observe(DOC);
    if (document.fonts && document.fonts.ready) document.fonts.ready.then(fit);
  }
  if (document.body) boot(); else addEventListener('DOMContentLoaded', boot);
  addEventListener('load', fit);
})();
</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 700px; height: 500px; overflow: hidden;
      background: #f5f5f5;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }
    canvas { display: block; touch-action: none; }
    #controls {
      height: 60px; padding: 0 10px;
      display: flex; align-items: center; gap: 8px;
      font-size: 12px; color: #334;
    }
    button {
      font-family: inherit; font-size: 12px; color: #334;
      background: #fff; border: 1px solid #b8c2cf; border-radius: 5px;
      padding: 4px 9px; cursor: pointer; white-space: nowrap;
    }
    button.on { background: #dbe7fa; border-color: #7b9fd4; }
    button:active { background: #cdd9ec; }
    .sep { width: 1px; height: 30px; background: #ccd4dd; margin: 0 2px; }
    .lbl { color: #556; white-space: nowrap; }
    .val { color: #223; font-weight: 600; min-width: 52px; }
    input[type=range] { width: 92px; accent-color: #5b84c4; }
    .spacer { flex: 1; }
  </style>
</head>
<body>
  <canvas id="c" width="700" height="440"></canvas>
  <div id="controls">
    <span class="lbl">frequency</span>
    <input type="range" id="freq" min="100" max="500" step="10" value="200">
    <span class="val" id="freqVal">200 Hz</span>
    <span class="lbl">separation</span>
    <input type="range" id="sepr" min="0.5" max="4" step="0.1" value="2">
    <span class="val" id="sepVal">2.0 m</span>
    <span class="sep"></span>
    <button id="mapBtn">Intensity map</button>
    <button id="pauseBtn">&#10074;&#10074; Pause</button>
    <span class="spacer"></span>
    <button id="resetBtn" title="Reset">&#8634; Reset</button>
  </div>
  <script>
  (() => {
    'use strict';
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const W = 700, H = 440;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);

    // ── Physical model ──────────────────────────────────────
    // A 14 m x 8.8 m room at 50 px/m; sound speed 343 m/s. Two in-phase
    // speakers on the left wall; what you see is the pressure field, slowed
    // ~150x so the wavefronts crawl instead of blurring.
    const PXM = 50;                 // px per meter
    const C_SOUND = 343;            // m/s
    const SLOW = 1 / 150;           // time-scale for the animation
    const SRC_X = 1.2;              // speaker x, m from the left wall
    const MID_Y = H / 2 / PXM;      // room mid-height, m
    const BLK = 2;                  // field resolution: 2x2 px blocks
    const GW = W / BLK, GH = H / BLK;
    const F_MIN = 100, F_MAX = 500, D_MIN = 0.5, D_MAX = 4;

    // ── URL params: ?freq=<Hz>&sep=<m>&map=1&paused=1 ───────
    const qp = new URLSearchParams(location.search);
    const num = (k, dflt, lo, hi) => {
      const v = parseFloat(qp.get(k));
      return Math.min(hi, Math.max(lo, isNaN(v) ? dflt : v));
    };
    const init = {
      freq: num('freq', 200, F_MIN, F_MAX),
      sep: num('sep', 2.0, D_MIN, D_MAX),
      map: qp.get('map') === '1',
      paused: qp.get('paused') === '1',
    };

    // ── State ───────────────────────────────────────────────
    let freq, sepM, mapOn, running, tSim = 0;
    let dragging = false;

    const freqEl = document.getElementById('freq');
    const sepEl = document.getElementById('sepr');
    const freqVal = document.getElementById('freqVal');
    const sepVal = document.getElementById('sepVal');
    const mapBtn = document.getElementById('mapBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    // ── Field tables ────────────────────────────────────────
    // Per-cell distance to each source (recomputed when sep changes) and
    // per-cell phase k*r (recomputed when freq or sep changes).
    const r1 = new Float32Array(GW * GH), r2 = new Float32Array(GW * GH);
    const p1 = new Float32Array(GW * GH), p2 = new Float32Array(GW * GH);
    const a1 = new Float32Array(GW * GH), a2 = new Float32Array(GW * GH);
    const TN = 4096, TMASK = TN - 1;
    const SIN = new Float32Array(TN);
    for (let i = 0; i < TN; i++) SIN[i] = Math.sin(i * 2 * Math.PI / TN);
    const PH = TN / (2 * Math.PI);  // rad -> table index

    const srcY = () => [MID_Y - sepM / 2, MID_Y + sepM / 2];

    function rebuildGeom() {
      const [y1, y2] = srcY();
      for (let gy = 0; gy < GH; gy++) {
        const y = (gy * BLK + BLK / 2) / PXM;
        for (let gx = 0; gx < GW; gx++) {
          const x = (gx * BLK + BLK / 2) / PXM;
          const i = gy * GW + gx;
          const dx = x - SRC_X;
          const d1 = Math.hypot(dx, y - y1), d2 = Math.hypot(dx, y - y2);
          r1[i] = d1; r2[i] = d2;
          a1[i] = 1 / Math.sqrt(Math.max(d1, 0.35));
          a2[i] = 1 / Math.sqrt(Math.max(d2, 0.35));
        }
      }
      rebuildPhase();
    }
    function rebuildPhase() {
      const k = 2 * Math.PI * freq / C_SOUND;     // rad/m
      for (let i = 0; i < r1.length; i++) {
        p1[i] = (k * r1[i] * PH) % TN;
        p2[i] = (k * r2[i] * PH) % TN;
      }
    }

    // ── Field rendering (into an offscreen block-grid canvas) ──
    const off = document.createElement('canvas');
    off.width = GW; off.height = GH;
    const octx = off.getContext('2d');
    const img = octx.createImageData(GW, GH);
    const px = img.data;

    // ripple palette: trough navy -> rest mid-blue -> crest pale
    function ripplePixel(i, u) {           // u in [-1, 1]
      const t = 0.5 + 0.5 * Math.max(-1, Math.min(1, u));
      px[i * 4] = 14 + 192 * t;
      px[i * 4 + 1] = 38 + 192 * t;
      px[i * 4 + 2] = 86 + 169 * t;
      px[i * 4 + 3] = 255;
    }
    // intensity palette: quiet deep navy -> loud yellow (through warm red)
    function heatPixel(i, t) {             // t in [0, 1]
      let r, g, b;
      if (t < 0.5) {
        const s = t / 0.5;
        r = 12 + 178 * s; g = 14 + 52 * s; b = 48 + 22 * s;     // navy -> red
      } else {
        const s = (t - 0.5) / 0.5;
        r = 190 + 65 * s; g = 66 + 154 * s; b = 70 - 10 * s;    // red -> yellow
      }
      px[i * 4] = r; px[i * 4 + 1] = g; px[i * 4 + 2] = b; px[i * 4 + 3] = 255;
    }

    function renderField() {
      const wt = ((2 * Math.PI * freq * tSim * PH) % TN + TN) % TN;
      if (mapOn) {
        // time-averaged amplitude (analytic): |a1 e^{ik r1} + a2 e^{ik r2}|,
        // locally normalized by (a1+a2) so the loud/quiet bands stay crisp
        // across the whole room.
        const QT = TN / 4;
        for (let i = 0; i < p1.length; i++) {
          const c1 = SIN[(p1[i] + QT) & TMASK], s1 = SIN[p1[i] & TMASK];
          const c2 = SIN[(p2[i] + QT) & TMASK], s2 = SIN[p2[i] & TMASK];
          const re = a1[i] * c1 + a2[i] * c2, im = a1[i] * s1 + a2[i] * s2;
          heatPixel(i, Math.hypot(re, im) / (a1[i] + a2[i]));
        }
      } else {
        for (let i = 0; i < p1.length; i++) {
          const u = (a1[i] * SIN[(p1[i] - wt + TN) & TMASK]
                   + a2[i] * SIN[(p2[i] - wt + TN) & TMASK]) / (a1[i] + a2[i]);
          ripplePixel(i, u);
        }
      }
      octx.putImageData(img, 0, 0);
    }

    // ── Scene drawing ───────────────────────────────────────
    function drawSpeaker(sx, sy) {
      ctx.save();
      ctx.translate(sx, sy);
      // cabinet
      ctx.beginPath();
      const w = 26, h = 34, r = 4;
      ctx.moveTo(-w / 2 + r, -h / 2);
      ctx.arcTo(w / 2, -h / 2, w / 2, h / 2, r);
      ctx.arcTo(w / 2, h / 2, -w / 2, h / 2, r);
      ctx.arcTo(-w / 2, h / 2, -w / 2, -h / 2, r);
      ctx.arcTo(-w / 2, -h / 2, w / 2, -h / 2, r);
      ctx.closePath();
      ctx.fillStyle = '#2d3340'; ctx.fill();
      ctx.strokeStyle = '#aeb6c2'; ctx.lineWidth = 1.5; ctx.stroke();
      // cone (faces right, into the room)
      ctx.beginPath(); ctx.arc(4, 0, 9, 0, Math.PI * 2);
      ctx.fillStyle = '#59617a'; ctx.fill();
      ctx.beginPath(); ctx.arc(4, 0, 4.5, 0, Math.PI * 2);
      ctx.fillStyle = '#8d96ad'; ctx.fill();
      ctx.beginPath(); ctx.arc(4, -11, 2.6, 0, Math.PI * 2);
      ctx.fillStyle = '#59617a'; ctx.fill();
      ctx.restore();
    }

    function draw() {
      renderField();
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(off, 0, 0, W, H);

      const [y1, y2] = srcY();
      drawSpeaker(SRC_X * PXM, y1 * PXM);
      drawSpeaker(SRC_X * PXM, y2 * PXM);

      // titles / readouts
      ctx.fillStyle = 'rgba(255,255,255,0.92)';
      ctx.font = 'bold 14px Segoe UI'; ctx.textAlign = 'left';
      ctx.fillText('Two-Speaker Interference', 12, 22);
      const lam = C_SOUND / freq;
      ctx.font = '12px Segoe UI'; ctx.textAlign = 'right';
      ctx.fillText(`f = ${freq} Hz    λ = ${lam.toFixed(2)} m    d = ${sepM.toFixed(1)} m`, W - 12, 22);
      ctx.textAlign = 'center';
      if (mapOn) {
        // legend
        const lx = W - 152, ly = H - 34, lw = 120, lh = 10;
        for (let i = 0; i < lw; i++) {
          const t = i / (lw - 1);
          let r, g, b;
          if (t < 0.5) { const s = t / 0.5; r = 12 + 178 * s; g = 14 + 52 * s; b = 48 + 22 * s; }
          else { const s = (t - 0.5) / 0.5; r = 190 + 65 * s; g = 66 + 154 * s; b = 70 - 10 * s; }
          ctx.fillStyle = `rgb(${r | 0},${g | 0},${b | 0})`;
          ctx.fillRect(lx + i, ly, 1.5, lh);
        }
        ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
        ctx.strokeRect(lx - 0.5, ly - 0.5, lw + 1, lh + 1);
        ctx.fillStyle = 'rgba(255,255,255,0.92)'; ctx.font = '11px Segoe UI';
        ctx.fillText('quiet', lx + 14, ly + 23);
        ctx.fillText('loud', lx + lw - 12, ly + 23);
        ctx.fillText('time-averaged loudness', lx + lw / 2, ly - 6);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.75)'; ctx.font = '11px Segoe UI';
        ctx.textAlign = 'left';
        ctx.fillText('sound slowed ~150×', 12, H - 10);
      }
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.font = '11.5px Segoe UI';
      ctx.fillText('Drag a speaker ↕ to change the separation', W / 2, H - 10);
    }

    // ── UI plumbing ─────────────────────────────────────────
    function syncLabels() {
      freqVal.textContent = `${freq} Hz`;
      sepVal.textContent = `${sepM.toFixed(1)} m`;
      mapBtn.classList.toggle('on', mapOn);
      pauseBtn.innerHTML = running ? '&#10074;&#10074; Pause' : '&#9654; Resume';
    }
    function applyInit() {
      freq = Math.round(init.freq / 10) * 10;
      sepM = init.sep;
      mapOn = init.map;
      running = !init.paused;
      tSim = 0;
      freqEl.value = freq;
      sepEl.value = sepM;
      rebuildGeom();
      syncLabels();
    }
    freqEl.addEventListener('input', () => {
      freq = parseFloat(freqEl.value);
      rebuildPhase(); syncLabels();
    });
    sepEl.addEventListener('input', () => {
      sepM = parseFloat(sepEl.value);
      rebuildGeom(); syncLabels();
    });
    mapBtn.addEventListener('click', () => { mapOn = !mapOn; syncLabels(); });
    pauseBtn.addEventListener('click', () => { running = !running; syncLabels(); });
    document.getElementById('resetBtn').addEventListener('click', applyInit);

    // drag a speaker vertically to set the separation
    const cpos = e => {
      const r = canvas.getBoundingClientRect();
      return [(e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height)];
    };
    const overSpeaker = (x, y) => {
      const [y1, y2] = srcY();
      return Math.abs(x - SRC_X * PXM) < 22 &&
             (Math.abs(y - y1 * PXM) < 26 || Math.abs(y - y2 * PXM) < 26);
    };
    canvas.addEventListener('pointerdown', e => {
      const [x, y] = cpos(e);
      if (overSpeaker(x, y)) {
        dragging = true;
        canvas.setPointerCapture(e.pointerId);
      }
    });
    canvas.addEventListener('pointermove', e => {
      const [x, y] = cpos(e);
      if (dragging) {
        const d = 2 * Math.abs(y / PXM - MID_Y);
        sepM = Math.round(Math.min(D_MAX, Math.max(D_MIN, d)) * 10) / 10;
        sepEl.value = sepM;
        rebuildGeom(); syncLabels();
      }
      canvas.style.cursor = (dragging || overSpeaker(x, y)) ? 'ns-resize' : 'default';
    });
    const endDrag = () => { dragging = false; };
    canvas.addEventListener('pointerup', endDrag);
    canvas.addEventListener('pointercancel', endDrag);

    // ── Main loop ───────────────────────────────────────────
    let lastTs = null;
    function frameLoop(ts) {
      if (lastTs === null) lastTs = ts;
      const dt = Math.min((ts - lastTs) / 1000, 0.05);
      lastTs = ts;
      if (running) tSim += dt * SLOW;
      draw();
      requestAnimationFrame(frameLoop);
    }
    applyInit();
    requestAnimationFrame(frameLoop);
  })();
  </script>




<!-- CHEAT PANEL — visible only when ?cheat=1 is in the URL -->
<script>
(function () {
  var _cpQ = new URLSearchParams(location.search);
  if (_cpQ.get('cheat') !== '1') return;

  var CHEAT_DEFS = [
    {
        "name": "freq",
        "type": "number",
        "min": 100,
        "max": 500,
        "step": 10,
        "default": 200,
        "desc": "Source frequency (Hz)"
    },
    {
        "name": "sep",
        "type": "number",
        "min": 0.5,
        "max": 4,
        "step": 0.1,
        "default": 2,
        "desc": "Source separation (m)"
    },
    {
        "name": "map",
        "type": "toggle",
        "default": 0,
        "desc": "Show interference intensity map"
    },
    {
        "name": "paused",
        "type": "toggle",
        "default": 0,
        "desc": "Start paused"
    },
    {
        "name": "maxscale",
        "type": "number",
        "min": 0.5,
        "max": 5,
        "step": 0.1,
        "default": 2.4,
        "desc": "Max zoom factor for responsive scaling"
    },
    {
        "name": "maxw",
        "type": "number",
        "min": 200,
        "max": 2000,
        "step": 50,
        "default": "",
        "desc": "Max rendered width (px); 0 = uncapped"
    },
    {
        "name": "h",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": "",
        "desc": "Exact reported iframe height (px); overrides auto"
    },
    {
        "name": "maxh",
        "type": "number",
        "min": 80,
        "max": 2000,
        "step": 10,
        "default": 320,
        "desc": "Ceiling on auto-reported iframe height (px)"
    }
  {name:'zoom', type:'toggle', default:0, desc:'Enable zoom/pan controls'},
];

  var EMBED_KEYS = ['cheat'];

  // Build clean URL (no embed/cheat params) with optional overrides
  function buildCleanUrl(overrides) {
    var p = new URLSearchParams(location.search);
    EMBED_KEYS.forEach(function (k) { p.delete(k); });
    for (var k in overrides) {
      var v = overrides[k];
      if (v === null || v === '') p.delete(k);
      else p.set(k, v);
    }
    var qs = p.toString();
    return location.origin + location.pathname + (qs ? '?' + qs : '');
  }

  function buildCheatUrl(overrides) {
    var base = buildCleanUrl(overrides);
    return base + (base.indexOf('?') >= 0 ? '&' : '?') + 'cheat=1';
  }

  var urlLinkEl = null; // set after render

  function updateUrlDisplay(overrides) {
    if (!urlLinkEl) return;
    var u = buildCleanUrl(overrides || {});
    urlLinkEl.href = u;
    urlLinkEl.textContent = u;
  }

  // Resolve the effective current value of a param (may differ from raw URL string)
  function getEffective(def) {
    var raw = _cpQ.get(def.name);
    if (raw === null) return def['default'] !== undefined ? String(def['default']) : '';
    return raw;
  }

  function isTruthy(v) {
    return v !== '0' && v !== 'false' && v !== 'no' && v !== 'off' && v !== '';
  }

  function makeControl(def) {
    var effective = getEffective(def);

    if (def.type === 'toggle') {
      var on = isTruthy(effective);
      var btn = document.createElement('button');
      btn.textContent = on ? '1 (on)' : '0 (off)';
      btn.style.cssText = 'background:' + (on ? '#1b3d1b' : '#3d1b1b') + ';color:' +
        (on ? '#6dca80' : '#e07070') + ';border:1px solid ' +
        (on ? '#2a7a3a' : '#8a2a2a') + ';border-radius:3px;padding:3px 10px;' +
        'cursor:pointer;font-size:12px;font-family:inherit;min-width:70px';
      btn.addEventListener('click', function () {
        var updates = {};
        updates[def.name] = on ? '0' : '1';
        window.location.href = buildCheatUrl(updates);
      });
      return btn;
    }

    if (def.type === 'select') {
      var sel = document.createElement('select');
      sel.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 8px;font-size:12px;font-family:inherit;cursor:pointer';
      def.values.forEach(function (v) {
        var opt = document.createElement('option');
        opt.value = v; opt.textContent = v;
        if (effective === String(v)) opt.selected = true;
        sel.appendChild(opt);
      });
      sel.addEventListener('change', function () {
        var updates = {}; updates[def.name] = sel.value;
        window.location.href = buildCheatUrl(updates);
      });
      return sel;
    }

    if (def.type === 'number') {
      var inp = document.createElement('input');
      inp.type = 'number';
      inp.value = effective;
      if (def.min !== undefined) inp.min = String(def.min);
      if (def.max !== undefined) inp.max = String(def.max);
      if (def.step !== undefined) inp.step = String(def.step);
      inp.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
        'border-radius:3px;padding:3px 6px;width:90px;font-size:12px;font-family:inherit';
      inp.addEventListener('change', function () {
        var updates = {}; updates[def.name] = inp.value;
        window.location.href = buildCheatUrl(updates);
      });
      return inp;
    }

    // text
    var inp2 = document.createElement('input');
    inp2.type = 'text';
    inp2.value = effective;
    inp2.style.cssText = 'background:#0d1b2a;color:#c8d8e8;border:1px solid #2a3f5f;' +
      'border-radius:3px;padding:3px 6px;width:220px;font-size:12px;font-family:inherit';
    inp2.addEventListener('change', function () {
      var updates = {}; updates[def.name] = inp2.value;
      window.location.href = buildCheatUrl(updates);
    });
    return inp2;
  }

  function typeLabel(def) {
    if (def.type === 'toggle') return '0 | 1';
    if (def.type === 'select') return def.values.join(' | ');
    if (def.type === 'number') {
      var s = 'number';
      if (def.min !== undefined && def.max !== undefined) s = def.min + '–' + def.max;
      else if (def.min !== undefined) s = '≥' + def.min;
      else if (def.max !== undefined) s = '≤' + def.max;
      return s;
    }
    return 'text';
  }

  function render() {
    // Panel container (fixed at bottom)
    var panel = document.createElement('div');
    panel.id = 'cheat-panel';
    panel.style.cssText = [
      'position:fixed', 'bottom:0', 'left:0', 'right:0',
      'background:rgba(12,18,32,0.97)',
      'color:#c8d8e8',
      'font-family:"Segoe UI",system-ui,monospace',
      'font-size:13px',
      'border-top:2px solid #3a7bd5',
      'z-index:2147483647',
      'max-height:48vh',
      'overflow-y:auto',
      'padding:10px 16px 14px',
      'box-sizing:border-box',
      'box-shadow:0 -4px 24px rgba(0,0,0,0.6)'
    ].join(';');

    // Title bar
    var title = document.createElement('div');
    title.style.cssText = 'font-weight:bold;font-size:13px;color:#7ab8f5;margin-bottom:8px;' +
      'display:flex;align-items:center;justify-content:space-between';
    var titleText = document.createElement('span');
    titleText.textContent = '🔑 Cheat Panel — ' + location.pathname.split('/').pop();
    var closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.title = 'Close cheat panel (reload to restore)';
    closeBtn.style.cssText = 'background:none;border:none;color:#7ab8f5;font-size:18px;' +
      'cursor:pointer;padding:0 4px;line-height:1';
    closeBtn.addEventListener('click', function () { panel.remove(); });
    title.appendChild(titleText);
    title.appendChild(closeBtn);
    panel.appendChild(title);

    // Table
    var table = document.createElement('table');
    table.style.cssText = 'border-collapse:collapse;width:100%;margin-bottom:10px';
    var thead = table.createTHead();
    var hrow = thead.insertRow();
    ['Parameter', 'Type / Values', 'Control', 'Description'].forEach(function (h) {
      var th = document.createElement('th');
      th.textContent = h;
      th.style.cssText = 'text-align:left;padding:4px 10px;border-bottom:1px solid #1e3050;' +
        'color:#5a8fc0;font-size:11px;text-transform:uppercase;letter-spacing:0.06em;' +
        'white-space:nowrap';
      hrow.appendChild(th);
    });
    var tbody = table.createTBody();
    CHEAT_DEFS.forEach(function (def) {
      var row = tbody.insertRow();
      var isSet = _cpQ.has(def.name);
      row.style.cssText = 'border-bottom:1px solid #131f30;' +
        (isSet ? 'background:rgba(58,123,213,0.08)' : '');

      // Name cell
      var nc = row.insertCell();
      nc.style.cssText = 'padding:5px 10px;font-weight:bold;font-size:12px;' +
        'color:' + (isSet ? '#a8d4ff' : '#7fa8d0') + ';white-space:nowrap;font-family:monospace';
      nc.textContent = def.name;

      // Type cell
      var tc = row.insertCell();
      tc.style.cssText = 'padding:5px 10px;color:#5a7a90;font-size:11px;' +
        'max-width:200px;font-family:monospace';
      tc.textContent = typeLabel(def);

      // Control cell
      var cc = row.insertCell();
      cc.style.cssText = 'padding:4px 10px;white-space:nowrap';
      cc.appendChild(makeControl(def));

      // Desc cell
      var dc = row.insertCell();
      dc.style.cssText = 'padding:5px 10px;color:#8aa0b0;font-size:12px';
      dc.textContent = (def.desc || '') + (def['default'] !== undefined
        ? ' (default: ' + def['default'] + ')' : '');
    });
    panel.appendChild(table);

    // URL display
    var urlBox = document.createElement('div');
    urlBox.style.cssText = 'background:#080d1a;border:1px solid #1e3050;border-radius:4px;' +
      'padding:7px 12px;display:flex;align-items:baseline;gap:8px;flex-wrap:wrap';
    var urlLabel = document.createElement('span');
    urlLabel.style.cssText = 'color:#5a8fc0;font-size:11px;text-transform:uppercase;' +
      'letter-spacing:0.06em;white-space:nowrap;flex-shrink:0';
    urlLabel.textContent = 'URL:';
    urlLinkEl = document.createElement('a');
    urlLinkEl.style.cssText = 'color:#5fba7d;word-break:break-all;font-size:12px;' +
      'font-family:monospace;text-decoration:none';
    urlLinkEl.addEventListener('click', function (e) {
      e.preventDefault();
      window.location.href = buildCheatUrl({});
    });
    var copyBtn = document.createElement('button');
    copyBtn.textContent = 'copy';
    copyBtn.style.cssText = 'background:#1a3050;color:#7ab8f5;border:1px solid #2a4a70;' +
      'border-radius:3px;padding:2px 8px;font-size:11px;font-family:inherit;cursor:pointer;' +
      'white-space:nowrap;flex-shrink:0;margin-left:4px';
    copyBtn.addEventListener('click', function () {
      var url = urlLinkEl ? urlLinkEl.href : buildCleanUrl({});
      navigator.clipboard.writeText(url).then(function () {
        copyBtn.textContent = 'copied!';
        copyBtn.style.color = '#6dca80';
        setTimeout(function () { copyBtn.textContent = 'copy'; copyBtn.style.color = '#7ab8f5'; }, 1500);
      }).catch(function () {
        copyBtn.textContent = 'failed';
        setTimeout(function () { copyBtn.textContent = 'copy'; }, 1500);
      });
    });
    updateUrlDisplay();
    urlBox.appendChild(urlLabel);
    urlBox.appendChild(urlLinkEl);
    urlBox.appendChild(copyBtn);
    panel.appendChild(urlBox);

    document.body.appendChild(panel);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
<!-- @include shared/zoom-overlay.js -->
<script>
(function () {
  /* Zoom/pan overlay — activated by ?zoom=1, hidden by default (?zoom=0 or absent). */
  var Q = new URLSearchParams(location.search);
  if (!Q.has('zoom') || Q.get('zoom') === '0') return;

  var css = document.createElement('style');
  css.textContent =
    '#_zui{position:fixed;top:8px;right:8px;display:flex;align-items:center;' +
    'gap:4px;background:rgba(0,0,0,.6);border-radius:8px;padding:5px 10px;' +
    'z-index:99999;font-family:Arial,sans-serif;user-select:none}' +
    '#_zui button{width:28px;height:28px;border:none;border-radius:4px;' +
    'background:rgba(255,255,255,.2);color:#fff;font-size:18px;' +
    'cursor:pointer;display:flex;align-items:center;justify-content:center}' +
    '#_zui button:hover{background:rgba(255,255,255,.35)}' +
    '#_zlab{color:#fff;font-size:13px;min-width:34px;text-align:center}';
  document.head.appendChild(css);

  /* Attach to <html> so position:fixed stays viewport-relative even when body has a transform. */
  var ui = document.createElement('div');
  ui.id = '_zui';
  ui.innerHTML =
    '<button id="_zo">&#8722;</button>' +
    '<span id="_zlab">1.0&#215;</span>' +
    '<button id="_zi">+</button>' +
    '<button id="_zr" title="Reset view">&#8634;</button>';
  document.documentElement.appendChild(ui);

  var Z = 1, tx = 0, ty = 0, drag = null;
  var body = document.body;
  var lab  = document.getElementById('_zlab');
  var rst  = document.getElementById('_zr');

  function apply() {
    /* window._userZoom signals the old-style scale-to-fit controller to stand down. */
    window._userZoom = Z > 1 ? Z : undefined;
    var s = window._scalerFitScale || 1;
    if (Z <= 1 && !tx && !ty) {
      body.style.transform = '';
      body.style.cursor    = '';
      window.dispatchEvent(new Event('resize')); /* let the scaler re-fit if present */
    } else {
      body.style.transformOrigin = '0 0';
      body.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + (s * Z) + ')';
      body.style.cursor    = 'grab';
    }
    lab.innerHTML         = Z.toFixed(1) + '&#215;';
    rst.style.opacity     = (Z > 1 || tx || ty) ? '1' : '0.4';
  }

  document.getElementById('_zi').onclick = function () {
    Z = Math.min(4, parseFloat((Z * 1.25).toFixed(2))); apply();
  };
  document.getElementById('_zo').onclick = function () {
    Z = Math.max(1, parseFloat((Z / 1.25).toFixed(2))); apply();
  };
  rst.onclick = function () { Z = 1; tx = 0; ty = 0; apply(); };

  document.documentElement.addEventListener('pointerdown', function (e) {
    if (Z <= 1 || (e.target.closest && e.target.closest('#_zui'))) return;
    drag = { x: e.clientX, y: e.clientY, tx: tx, ty: ty };
    body.style.cursor = 'grabbing';
  });
  document.documentElement.addEventListener('pointermove', function (e) {
    if (!drag) return;
    tx = drag.tx + (e.clientX - drag.x);
    ty = drag.ty + (e.clientY - drag.y);
    body.style.transform =
      'translate(' + tx + 'px,' + ty + 'px) scale(' + ((window._scalerFitScale || 1) * Z) + ')';
  });
  document.documentElement.addEventListener('pointerup', function () {
    drag = null;
    if (Z > 1) body.style.cursor = 'grab';
  });
})();
</script>
<!-- @end-include shared/zoom-overlay.js -->
</body>
